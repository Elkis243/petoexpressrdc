{% load static %}
<section
  class="hero-section service-page-hero"
  style="--hero-bg-image: url('{% static 'images/other-hero.png' %}');"
  aria-labelledby="service-page-title"
>
  <div class="hero-section__bg" aria-hidden="true"></div>

  <div class="container position-relative">
    <div class="service-page-hero__content text-center">
      <h1 class="service-page-hero__title" id="service-page-title">{{ service_title }}</h1>
      <nav class="service-page-hero__breadcrumb" aria-label="Fil d'Ariane">
        <a href="{% url 'core:home' %}">Home</a>
        <span class="service-page-hero__breadcrumb-sep" aria-hidden="true">/</span>
        <a href="{% url 'core:home' %}#nos-services">Nos services</a>
        <span class="service-page-hero__breadcrumb-sep" aria-hidden="true">/</span>
        <span aria-current="page">{{ service_title }}</span>
      </nav>
    </div>
  </div>
</section>
